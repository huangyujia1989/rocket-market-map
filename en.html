use frontier", "order": 3, "color": "#8B5CF6", "why_zh": "目标不是小幅降本，而是直接改写每公斤发射成本和可运送体积的上限。", "tradeoff_zh": "好处是上限最高；代价是热防护、快速周转、轨道补加注等系统难度显著更高。", "fit_zh": "适合押注超重型运力、超大星座、深空物流的玩家。", "examples_zh": "代表：Starship、Nova。"}, "sovereign_assured": {"zh": "主权保障型", "en": "Sovereign assured access", "order": 4, "color": "#F59E0B", "why_zh": "目标是保证国家/关键任务能按规则、按认证、按计划发出去，而不是先拼最低价。", "tradeoff_zh": "好处是可靠、任务范围广、政治与安全价值高；代价通常是成本更高、节奏更慢。", "fit_zh": "适合国家安全、主权航天、制度性订单占比高的体系。", "examples_zh": "代表：Vulcan、Ariane 6、长征现役舰队。"}, "dedicated_small": {"zh": "专属小火箭", "en": "Dedicated small launchers", "order": 5, "color": "#10B981", "why_zh": "目标是给小卫星或特定轨道提供专属窗口，不和大型拼车任务绑定。", "tradeoff_zh": "好处是灵活、等待时间短；代价是单位成本通常更高，单发运力有限。", "fit_zh": "适合小卫星专属发射、技术验证、对时间窗很敏感的客户。", "examples_zh": "代表：Electron、Alpha、Spectrum、Miura 5。"}, "responsive_solid": {"zh": "固体快速响应", "en": "Responsive solid launchers", "order": 6, "color": "#EF4444", "why_zh": "目标是快速部署、简化操作、在有限基础设施下尽快把有效载荷送上去。", "tradeoff_zh": "好处是准备周期短、体系简单；代价是长期成本和轨道灵活性通常不如高频液体复用路线。", "fit_zh": "适合快速响应、部分政府任务、补网和早期商业部署。", "examples_zh": "代表：Vega C、谷神星一号、力箭一号、引力一号。"}}, "goalDefinitions": {"low_cost": {"zh": "降低长期成本", "en": "Lower long-term cost", "routes": ["scaled_reuse", "reuse_challenger", "frontier_full_reuse"], "summary_zh": "想把每公斤成本打下来，通常就要走复用，尤其是一子级复用或全复用。"}, "high_payload": {"zh": "提高单发运力", "en": "Increase payload per launch", "routes": ["scaled_reuse", "reuse_challenger", "frontier_full_reuse", "sovereign_assured"], "summary_zh": "想把更多质量一次送上去，往往需要更大的一级、更强发动机集群和更重的地面体系。"}, "high_reliability": {"zh": "提高任务把握度", "en": "Increase mission assurance", "routes": ["scaled_reuse", "sovereign_assured"], "summary_zh": "政府和高价值载荷往往优先考虑可靠性与认证，而不是绝对最低价。"}, "fast_schedule": {"zh": "加快发射节奏", "en": "Increase launch cadence", "routes": ["scaled_reuse", "dedicated_small", "responsive_solid"], "summary_zh": "想快，通常要么做高频复用主力，要么做专属小火箭或快速响应火箭。"}, "sovereignty": {"zh": "保住主权与准入", "en": "Preserve sovereign access", "routes": ["sovereign_assured", "responsive_solid", "ded
