function renderHero(){const arr=filteredNodes(); const total=sum(arr,state.metric); const topNode=[...arr].sort((a,b)=>metricValue(b)-metricValue(a))[0]; const regs=['US','Europe','China'].map(r=>({region:r,total:sum(arr.filter(n=>n.region===r),state.metric)})).sort((a,b)=>b.total-a.total); const topRegion=regs[0]; const live=arr.filter(n=>n.horizon_bucket==='Live 2026 supply').length; const option=arr.filter(n=>n.horizon_bucket==='2027-2030 option').length; document.getElementById('heroKpis').innerHTML=[[T.selectedMetric,total,METRICS[state.metric].desc],[T.topRegion,(topRegion?topRegion.region:'—'),(topRegion?METRICS[state.metric].format(topRegion.total):'')],[T.topNode,(topNode?topNode.vehicle:'—'),(topNode?topNode.company+' · '+METRICS[state.metric].format(metricValue(topNode)):'')],[T.coveredNodes,arr.length,T.liveOption.replace('{live}',live).replace('{option}',option)]].map(x=>'<div class="kpi"><div class="label">'+esc(x[0])+'</div><div class="value">'+esc(String(x[1]))+'</div><div class="sub">'+esc(String(x[2]))+'</div></div>').join('');}
function renderInsights(){const arr=filteredNodes(); const topCompany=filteredCompanies().sort((a,b)=>(Number(b[state.metric])||0)-(Number(a[state.metric])||0))[0]; const avgCost=(arr.reduce((s,n)=>s+(Number(n.cost_score)||0),0)/(arr.length||1)).toFixed(1); document.getElementById('insightGrid').innerHTML=[{k:T.nodesTracked,v:arr.length,s:T.nodesTrackedSub},{k:T.topCompany,v:(topCompany?topCompany.company:'—'),s:(topCompany?METRICS[state.metric].format(topCompany[state.metric]):'')},{k:T.avgCost,v:avgCost+'/10',s:T.avgCostSub}].map(x=>'<div class="tile"><div class="small">'+esc(x.k)+'</div><div class="big">'+esc(String(x.v))+'</div><div class="small" style="margin-top:8px">'+esc(String(x.s))+'</div></div>').join('');}
function renderRegionBars(){const arr=filteredNodes(); const regs=['US','Europe','China'].map(r=>({region:r,total:sum(arr.filter(n=>n.region===r),state.metric)})); const max=Math.max(...regs.map(r=>r.total),1); document.getElementById('regionBars').innerHTML=regs.map(r=>'<div class="bar-row" data-region="'+r.region+'"><div class="bar-head"><strong>'+r.region+'</strong><span>'+METRICS[state.metric].format(r.total)+'</span></div><div class="bar"><span style="width:'+(100*r.total/max)+'%;background:'+regionColor[r.region]+'"></span></div></div>').join(''); document.querySelectorAll('#regionBars .bar-row').forEach(el=>el.addEventListener('click',()=>{state.region=(state.region===el.dataset.region?'All':el.dataset.region); syncControls(); rerender();}));}
function renderStatusGrid(){const arr=filteredNodes(); const buckets=unique(nodes.map(n=>n.horizon_bucket)); document.getElementById('statusGrid').innerHTML=buckets.map(b=>{const v=sum(arr.filter(n=>n.horizon_bucket===b),state.metric); return '<div class="tile"><div class="small">'+esc(b)+'</div><div class="big">'+METRICS[state.metric].format(v)+'</div><div class="small" style="margin-top:8px">'+arr.filter(n=>n.horizon_bucket===b).length+' nodes</div></div>';}).join('');}
function renderCompanyBars(){const arr=filteredCompanies().sort((a,b)=>(Number(b[state.metric])||0)-(Number(a[state.metric])||0)).slice(0,12); const max=Math.max(...arr.map(c=>Number(c[state.metric])||0),1); document.getElementById('companyBars').innerHTML=arr.map(c=>'<div class="bar-row" data-company="'+esc(c.company)+'" data-region="'+esc(c.region)+'"><div class="bar-head"><strong>'+esc(c.company)+'</strong><span>'+METRICS[state.metric].format(c[state.metric])+'</span></div><div class="bar"><span style="width:'+(100*(Number(c[state.metric])||0)/max)+'%;background:'+regionColor[c.region]+'"></span></div><div class="small" style="margin-top:6px">'+esc(c.region)+' · '+esc(c.ownership_class||'')+'</div></div>').join(''); document.querySelectorAll('#companyBars .bar-row').forEach(el=>el.addEventListener('click',()=>openCompany(companies.find(c=>c.company===el.dataset.company&&c.region===el.dataset.region))));}
function renderRouteHeatmap(){const arr=filteredNodes(); const rows=unique(nodes.map(n=>n.reusability_class)); const cols=unique(nodes.map(n=>n.propellant_class)); let vals=[]; rows.forEach(r=>cols.forEach(c=>vals.push(sum(arr.filter(n=>n.reusability_class===r&&n.propellant_class===c),state.metric)))); const max=Math.max(...vals,1); let html=''; rows.forEach(r=>{html+='<div class="heat-row"><div class="row-label small">'+esc(r)+'</div>'; cols.forEach(c=>{const v=sum(arr.filter(n=>n.reusability_class===r&&n.propellant_class===c),state.metric); const a=(v/max)*0.9+0.08; html+='<div class="hm-cell" data-r="'+esc(r)+'" data-p="'+esc(c)+'" style="background:rgba(105,179,255,'+a.toFixed(2)+')"><div class="small">'+esc(c)+'</div><div class="hm-v">'+METRICS[state.metric].format(v)+'</div></div>';}); html+='</div>';}); document.getElementById('routeHeatmap').innerHTML='<div class="heatmap">'+html+'</div>'; document.querySelectorAll('#routeHeatmap .hm-cell').forEach(el=>el.addEventListener('click',()=>{state.reusability=el.dataset.r; state.propellant=el.dataset.p; syncControls(); rerender();}));}
function renderScatter(){const svg=document.getElementById('scatter'); const arr=filteredNodes().slice().sort((a,b)=>metricValue(b)-metricValue(a)).slice(0,18); const W=900,H=380,p=36; svg.setAttribute('viewBox','0 0 '+W+' '+H); const maxX=Math.max(...arr.map(n=>Number(n.single_launch_kg)||0),1), maxY=10; let out='<line class="axis" x1="'+p+'" y1="'+(H-p)+'" x2="'+(W-p)+'" y2="'+(H-p)+'"></line><line class="axis" x1="'+p+'" y1="'+p+'" x2="'+p+'" y2="'+(H-p)+'"></line><text class="axis-text" x="'+(W/2-60)+'" y="'+(H-8)+'">'+esc(T.xAxis)+'</text><text class="axis-text" transform="translate(14,'+(H/2+20)+') rotate(-90)">'+esc(T.yAxis)+'</text>'; [0,.25,.5,.75,1].forEach(t=>{const x=p+t*(W-2*p); const val=Math.round(t*maxX); out+='<line class="axis" x1="'+x+'" y1="'+p+'" x2="'+x+'" y2="'+(H-p)+'" opacity="0.25"></line><text class="axis-text" x="'+(x-10)+'" y="'+(H-p+16)+'">'+val.toLocaleString()+'</text>';}); [0,2,4,6,8,10].forEach(v=>{const y=H-p-(v/maxY)*(H-2*p); out+='<line class="axis" x1="'+p+'" y1="'+y+'" x2="'+(W-p)+'" y2="'+y+'" opacity="0.25"></line><text class="axis-text" x="6" y="'+(y+4)+'">'+v+'</text>';}); const maxMetric=Math.max(...arr.map(metricValue),1); arr.forEach(n=>{const x=p+(Number(n.single_launch_kg)||0)/maxX*(W-2*p); const y=H-p-((Number(n.cost_score)||0)/maxY)*(H-2*p); const r=8+30*Math.sqrt((metricValue(n)||0)/maxMetric); out+='<circle class="point" data-id="'+esc(n.id)+'" cx="'+x+'" cy="'+y+'" r="'+r+'" fill="'+regionColor[n.region]+'"></circle><text class="point-label" x="'+(x+r+4)+'" y="'+(y+4)+'">'+esc(n.vehicle.slice(0,18))+'</text>';}); svg.innerHTML=out; svg.querySelectorAll('.point').forEach(el=>el.addEventListener('click',()=>openNode(nodes.find(n=>n.id===el.dataset.id))));}
function renderProgramTable(){const arr=filteredNodes().slice().sort((a,b)=>metricValue(b)-metricValue(a)); document.getElementById('programTable').innerHTML='<thead><tr><th>'+T.region+'</th><th>'+T.company+'</th><th>'+T.vehicle+'</th><th>'+METRICS[state.metric].label+'</th><th>'+T.status+'</th><th>'+T.reusability+'</th><th>'+T.propellant+'</th></tr></thead><tbody>'+arr.map(n=>'<tr data-id="'+esc(n.id)+'"><td>'+esc(n.region)+'</td><td>'+esc(n.company)+'</td><td>'+esc(n.vehicle)+'</td><td>'+METRICS[state.metric].format(metricValue(n))+'</td><td>'+esc(n.horizon_bucket)+'</td><td>'+esc(n.reusability_class)+'</td><td>'+esc(n.propellant_class)+'</td></tr>').join('')+'</tbody>'; document.querySelectorAll('#programTable tbody tr').forEach(tr=>tr.addEventListener('click',()=>openNode(nodes.find(n=>n.id===tr.dataset.id))));}
function renderCompanyTable(){const arr=filteredCompanies().slice().sort((a,b)=>(Number(b[state.metric])||0)-(Number(a[state.metric])||0)); document.getElementById('companyTable').innerHTML='<thead><tr><th>'+T.region+'</th><th>'+T.company+'</th><th>'+METRICS[state.metric].label+'</th><th>'+T.valuation+'</th><th>'+T.funding+'</th></tr></thead><tbody>'+arr.map(c=>'<tr data-company="'+esc(c.company)+'" data-region="'+esc(c.region)+'"><td>'+esc(c.region)+'</td><td>'+esc(c.company)+'</td><td>'+METRICS[state.metric].format(c[state.metric])+'</td><td>'+esc(c.valuation||'')+'</td><td>'+esc(c.funding||'')+'</td></tr>').join('')+'</tbody>'; document.querySelectorAll('#companyTable tbody tr').forEach(tr=>tr.addEventListener('click',()=>openCompany(companies.find(c=>c.company===tr.dataset.company&&c.region===tr.dataset.region))));}
function renderSources(){const rows=[]; filteredNodes().forEach(n=>(n.sources||[]).forEach(s=>rows.push([n.company,n.vehicle,s.label||s.title||'',s.url||'']))); document.getElementById('sourceTable').innerHTML='<thead><tr><th>'+T.company+'</th><th>'+T.vehicle+'</th><th>'+T.source+'</th><th>URL</th></tr></thead><tbody>'+rows.slice(0,400).map(r=>'<tr><td>'+esc(r[0])+'</td><td>'+esc(r[1])+'</td><td>'+esc(r[2])+'</td><td><a href="'+esc(r[3])+'" target="_blank" rel="noopener">'+esc(r[3])+'</a></td></tr>').join('')+'</tbody>';}
function openNode(n){if(!n)return; document.getElementById('drawerInner').innerHTML='<button class="close" id="drawerClose">'+T.close+'</button><div class="small">'+esc(n.region)+' · '+esc(n.country||'')+' · '+esc(n.horizon_bucket)+'</div><h2>'+esc(n.vehicle)+'</h2><div class="small" style="margin-bottom:12px">'+esc(n.company)+'</div><div>'+['ownership_class','reusability_class','propellant_class','architecture_class'].map(k=>n[k]?'<span class="pill">'+esc(n[k])+'</span>':'').join('')+'</div><div class="grid-2"><div class="tile"><div class="small">'+T.metric2026+'</div><div class="big">'+fmt(n.supply_2026_kg)+'</div></div><div class="tile"><div class="small">'+T.metric2030+'</div><div class="big">'+fmt(n.supply_2030_kg)+'</div></div><div class="tile"><div class="small">'+T.metricSingle+'</div><div class="big">'+fmt(n.single_launch_kg)+'</div></div><div class="tile"><div class="small">'+T.costScore+'</div><div class="big">'+esc(String(n.cost_score||''))+'/10</div></div></div><h3>'+T.detailRoute+'</h3><p class="note">'+esc(n.cost_logic||n.route_note||n.note||'')+'</p><h3>'+T.detailCapital+'</h3><p class="note">'+esc([n.valuation,n.funding,n.investors].filter(Boolean).join(' | ')||'—')+'</p><h3>'+T.detailSources+'</h3><ul>'+((n.sources||[]).map(s=>'<li><a href="'+esc(s.url||'#')+'" target="_blank" rel="noopener">'+esc(s.label||s.title||s.url||'Source')+'</a></li>').join('')||'<li>—</li>')+'</ul>'; document.getElementById('drawer').classList.add('open'); document.getElementById('drawerBackdrop').classList.add('open'); document.getElementById('drawerClose').onclick=closeDrawer;}
function openCompany(c){if(!c)return; const rel=nodes.filter(n=>n.company===c.company&&n.region===c.region); document.getElementById('drawerInner').innerHTML='<button class="close" id="drawerClose">'+T.close+'</button><div class="small">'+esc(c.region)+'</div><h2>'+esc(c.company)+'</h2><div>'+(c.ownership_class?'<span class="pill">'+esc(c.ownership_class)+'</span>':'')+'</div><div class="grid-2"><div class="tile"><div class="small">'+T.metric2026+'</div><div class="big">'+fmt(c.supply_2026_kg||0)+'</div></div><div class="tile"><div class="small">'+T.metric2030+'</div><div class="big">'+fmt(c.supply_2030_kg||0)+'</div></div><div class="tile"><div class="small">'+T.valuation+'</div><div class="big">'+esc(c.valuation||'—')+'</div></div><div class="tile"><div class="small">'+T.funding+'</div><div class="big">'+esc(c.funding||'—')+'</div></div></div><h3>'+T.relatedVehicles+'</h3><ul>'+rel.map(n=>'<li><a href="#" data-id="'+esc(n.id)+'">'+esc(n.vehicle)+'</a></li>').join('')+'</ul><h3>'+T.detailCapital+'</h3><p class="note">'+esc(c.investors||'—')+'</p>'; document.getElementById('drawer').classList.add('open'); document.getElementById('drawerBackdrop').classList.add('open'); document.getElementById('drawerClose').onclick=closeDrawer; document.querySelectorAll('#drawerInner a[data-id]').forEach(a=>a.onclick=e=>{e.preventDefault(); openNode(nodes.find(n=>n.id===a.dataset.id));});}
function closeDrawer(){document.getElementById('drawer').classList.remove('open'); document.getElementById('drawerBackdrop').classList.remove('open');}
function syncControls(){['region','bucket','ownership','reusability','propellant'].forEach(k=>document.getElementById(k+'Filter').value=state[k]); document.getElementById('searchBox').value=state.search;}
function setupTabs(){const tabs=[['overview',T.tabOverview],['programs',T.tabPrograms],['companies',T.tabCompanies],['sources',T.tabSources]]; document.getElementById('tabs').innerHTML=tabs.map(([id,label])=>'<button class="'+(state.activeTab===id?'active':'')+'" data-tab="'+id+'">'+label+'</button>').join(''); document.querySelectorAll('#tabs button').forEach(btn=>btn.addEventListener('click',()=>{state.activeTab=btn.dataset.tab; updateTabs();})); updateTabs();}
function updateTabs(){document.querySelectorAll('#tabs button').forEach(btn=>btn.classList.toggle('active',btn.dataset.tab===state.activeTab)); ['overview','programs','companies','sources'].forEach(id=>{document.getElementById('tab-'+id).style.display=(id===state.activeTab?'block':'none');});}
function downloadCsv(){const rows=[['region','company','vehicle','horizon_bucket','ownership_class','reusability_class','propellant_class','single_launch_kg','supply_2026_kg','supply_2030_kg','cost_score','valuation','funding','investors']]; nodes.forEach(n=>rows.push([n.region,n.company,n.vehicle,n.horizon_bucket,n.ownership_class,n.reusability_class,n.propellant_class,n.single_launch_kg,n.supply_2026_kg,n.supply_2030_kg,n.cost_score,n.valuation,n.funding,n.investors])); const csv=rows.map(r=>r.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(',')).join('
'); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'})); a.download='rocket_market_map_2026_2030.csv'; a.click();}
function downloadJson(){const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(DATA,null,2)],{type:'application/json;charset=utf-8;'})); a.download='rocket_market_map_2026_2030.json'; a.click();}
function setupEvents(){document.getElementById('searchBox').addEventListener('input',e=>{state.search=e.target.value; rerender();}); ['region','bucket','ownership','reusability','propellant'].forEach(k=>document.getElementById(k+'Filter').addEventListener('change',e=>{state[k]=e.target.value; rerender();})); document.getElementById('drawerBackdrop').addEventListener('click',closeDrawer); document.getElementById('downloadCsvBtn').addEventListener('click',downloadCsv); document.getElementById('downloadJsonBtn').addEventListener('click',downloadJson);}
function rerender(){renderMetricSwitch(); renderHero(); renderInsights(); renderRegionBars(); renderStatusGrid(); renderCompanyBars(); renderRouteHeatmap(); renderScatter(); renderProgramTable(); renderCompanyTable(); renderSources(); setupTabs(); syncControls();}
initCopy(); initFilters(); setupEvents(); rerender();
})();
</script>
</body></html>
